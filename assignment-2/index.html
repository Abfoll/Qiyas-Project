<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Browser Mockup</title>
	<link rel="stylesheet" href="index.css">
</head>
<body>
	<main class="scene" aria-label="Browser new tab mockup">
		<header class="top-actions" aria-label="Top right actions">
			<a href="#" aria-label="Gmail">Gmail</a>
			<a href="#" aria-label="Images">Images</a>
			<button class="apps-btn" type="button" aria-label="Google apps">⋮⋮⋮</button>
			<button class="profile-btn" type="button" aria-label="Profile">KB</button>
		</header>

		<section class="search-stage" aria-label="Google search content">
			<h1 class="logo" aria-label="Google logo">
				<span class="g-blue">G</span><span class="g-red">o</span><span class="g-yellow">o</span><span class="g-blue">g</span><span class="g-green">l</span><span class="g-red">e</span>
			</h1>

			<form class="search-bar" role="search" aria-label="Search">
				<span class="search-icon">⌕</span>
				<input type="text" value="Search Google or type a URL" aria-label="Search input" readonly>
				<div class="search-tools" aria-hidden="true">
					<span>🎤</span>
					<span>📷</span>
					<button type="button">AI Mode</button>
				</div>
			</form>

			<ul class="shortcuts" aria-label="Shortcuts">
				<li><span class="dot">◌</span><small>ChatGPT</small></li>
				<li><span class="dot orange">⟲</span><small>Webmail Login</small></li>
				<li><span class="dot">⌂</span><small>GitHub</small></li>
				<li><span class="dot">▲</span><small>Create Next App</small></li>
				<li><span class="dot pink">IP</span><small>DELDEY RELST...</small></li>
				<li><span class="dot pink">IP</span><small>Verify Session</small></li>
				<li><span class="dot plus">+</span><small>Add shortcut</small></li>
			</ul>
		</section>

		<aside class="pip-card" aria-label="meet.google.com permission popup">
			<div class="pip-top">
				<span class="handle">⟷</span>
				<span class="site">meet.google.com</span>
				<span class="icons">⌄ ⌄</span>
			</div>

			<div class="pip-content">
				<h2>meet.google.com wants to</h2>
				<p>Enter picture-in-picture automatically,<br>so you can use it on top of other tabs<br>and windows.</p>

				<div class="pip-actions">
					<button type="button">Allow this time</button>
					<button type="button">Allow on every visit</button>
					<button type="button">Don't allow</button>
				</div>
			</div>

			<div class="phone-pane" aria-hidden="true">
				<div class="phone-controls">
					<i></i><i></i><i></i><i></i><i class="end"></i>
				</div>
			</div>
		</aside>
	</main>
</body>
</html>
